name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@39fdf500b386709a9a4a769f717dad447ac345b9 # v6
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: java-kotlin
      # Manual build instead of `autobuild`. CodeQL's autobuild script
      # picks the wrong Gradle target for this multi-module project and
      # fails immediately. `./gradlew assemble` compiles every subproject's
      # sources without running tests — exactly what CodeQL needs to
      # extract. (`classes` is not a root-project task on KMP-style
      # multi-module Gradle setups.)
      - name: Compile sources for CodeQL extraction
        run: ./gradlew --no-daemon assemble
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:java-kotlin"

