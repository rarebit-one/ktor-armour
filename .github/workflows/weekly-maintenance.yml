name: Weekly Maintenance

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-maintenance-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  maintenance:
    uses: rarebit-one/.github/.github/workflows/reusable-weekly-maintenance.yml@v2
    with:
      stack: kmp
      jdk-version: '21'
      gradle-test-command: ./gradlew test
    secrets:
      claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
